<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal DME — Intake Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-mark {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 12px;
  }
  .logo-name {
    color: #f8fafc;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .logo-sub {
    color: #64748b;
    font-size: 12px;
    margin-top: 3px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  label {
    display: block;
    color: #94a3b8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #f8fafc;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: 0.1em;
  }
  input[type="password"]:focus {
    border-color: #3b82f6;
    background: rgba(59,130,246,0.08);
  }
  .error {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: .88; }
  .hint {
    text-align: center;
    color: #475569;
    font-size: 11px;
    margin-top: 24px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">&#x1F4CB;</div>
    <div class="logo-name">Coastal DME</div>
    <div class="logo-sub">Intake Agent Platform</div>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="password">Access Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" autofocus autocomplete="current-password">
    <button type="submit">Enter Demo</button>
  </form>

  <div class="hint">Authorized personnel only.<br>Contact your team lead for access.</div>
</div>
</body>
</html>
